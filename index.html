<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia de Tendencia Central</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --danger-light: #fadbd8;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --accent: #ffb703;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
            padding: 25px 20px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* Formulario e Inputs */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        /* Botones de Menú y Temas */
        .menu-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(67, 97, 238, 0.2);
        }

        .menu-btn:active { transform: scale(0.98); }
        .btn-secondary { background-color: #6c757d; box-shadow: none; }
        .btn-topic {
            background-color: #f8f9fa;
            color: var(--text-main);
            border: 2px solid #e2e8f0;
            box-shadow: none;
        }
        .btn-topic:hover { background-color: #edf2f7; }

        /* Interfaz de Juego */
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .player-tag {
            font-weight: bold;
            color: var(--text-main);
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-tag {
            background-color: #eef2ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
        }

        .lives {
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .question-target {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .data-set {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            background: var(--bg);
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 25px;
        }

        /* Opciones */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            font-size: 1.3rem;
            font-weight: 600;
            padding: 18px 10px;
            border-radius: 16px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        .option-btn.correct {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.3);
        }

        .option-btn.incorrect {
            background-color: var(--danger-light);
            border-color: var(--danger-light);
            color: var(--danger);
            text-decoration: line-through;
            opacity: 0.7;
        }

        .option-btn.blink-correct {
            animation: blinker 1.2s linear infinite;
            background-color: var(--success);
            border-color: var(--success);
            color: white;
        }

        @keyframes blinker {
            50% { opacity: 0.5; transform: scale(1.03); }
        }

        /* Retroalimentación */
        .feedback-box {
            min-height: 85px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .feedback-text {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        /* Tablas de Líderes */
        .tab-container {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            background: var(--bg);
            padding: 5px;
            border-radius: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 5px;
            font-size: 0.85rem;
            border: none;
            background: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px;
            text-align: left;
        }

        .leaderboard-table th {
            color: var(--text-muted);
            border-bottom: 2px solid var(--bg);
            font-weight: 600;
        }

        .leaderboard-table tr:not(:last-child) td {
            border-bottom: 1px solid #f0f0f0;
        }

        .rank-badge {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .rank-1 { background-color: #ffe3a8; color: #b07d00; }
        .rank-2 { background-color: #e2e8f0; color: #4a5568; }
        .rank-3 { background-color: #ffedd5; color: #c2410c; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen-welcome" class="screen">
            <h1>Estadística Play</h1>
            <p class="subtitle">Domina las medidas de tendencia central</p>
            
            <div class="form-group">
                <label for="player-name">Escribe tu nombre:</label>
                <input type="text" id="player-name" placeholder="Ej. Carlos" maxlength="12">
            </div>

            <label style="text-align: left;">Selecciona un tema para jugar:</label>
            <button class="menu-btn btn-topic" onclick="selectTopic('media')">📊 Media Aritmética</button>
            <button class="menu-btn btn-topic" onclick="selectTopic('mediana')">⚖️ Mediana</button>
            <button class="menu-btn btn-topic" onclick="selectTopic('moda')">🔥 Moda</button>
            
            <button class="menu-btn btn-secondary" style="margin-top: 15px;" onclick="switchScreen('screen-scores')">🏆 Ver Récords</button>
        </div>

        <div id="screen-game" class="screen hidden">
            <div class="header-stats">
                <div class="player-tag" id="game-player-name">Jugador</div>
                <div>Aciertos: <span class="score-tag" id="game-score">0</span></div>
                <div class="lives" id="game-lives">❤️❤️❤️</div>
            </div>

            <div class="question-target" id="game-topic-title">TEMA</div>
            <p style="color: var(--text-muted); margin: 0 0 15px 0; font-size: 0.95rem;">Calcula el valor correcto para este conjunto:</p>
            
            <div class="data-set" id="game-dataset">[0, 0, 0, 0, 0]</div>

            <div class="options-grid" id="game-options">
                </div>

            <div class="feedback-box">
                <div class="feedback-text" id="game-feedback"></div>
                <button class="menu-btn" id="game-action-btn" style="display:none; width:auto; padding: 12px 25px;" onclick="handleActionClick()"></button>
            </div>
        </div>

        <div id="screen-scores" class="screen hidden">
            <h1>Puntajes Máximos</h1>
            <p class="subtitle">Los 10 mejores récords por categoría</p>

            <div class="tab-container">
                <button class="tab-btn active" id="tab-media" onclick="filterLeaderboard('media')">Media</button>
                <button class="tab-btn" id="tab-mediana" onclick="filterLeaderboard('mediana')">Mediana</button>
                <button class="tab-btn" id="tab-moda" onclick="filterLeaderboard('moda')">Moda</button>
            </div>

            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th style="width: 15%">Pos</th>
                        <th style="width: 55%">Nombre</th>
                        <th style="width: 30%; text-align: right;">Aciertos</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    </tbody>
            </table>

            <button class="menu-btn btn-secondary" onclick="switchScreen('screen-welcome')">Volver al Menú</button>
        </div>

    </div>

    <script>
        // Estructuras de Estado
        let state = {
            playerName: '',
            currentTopic: '', // 'media', 'mediana', 'moda'
            score: 0,
            lives: 3,
            correctAnswer: 0,
            isLevelActive: false,
            isGameOver: false
        };

        // Inicialización de base de datos local para Records
        if (!localStorage.getItem('edu_leaderboards')) {
            localStorage.setItem('edu_leaderboards', JSON.stringify({ media: [], mediana: [], moda: [] }));
        }

        // Navegación de Pantallas
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            if(screenId === 'screen-scores') {
                filterLeaderboard('media'); // Default tab al abrir records
            }
        }

            if (!nameInput) {
