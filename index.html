<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reto Infinito: Tendencia Central</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --danger-light: #fadbd8;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Optimizaciones para pantallas táctiles */
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
            padding: 30px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg);
        }

        .title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .lives {
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .question-box {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .question-target {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .data-set {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: var(--bg);
            padding: 15px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            font-size: 1.4rem;
            font-weight: 600;
            padding: 18px 10px; /* Botones grandes para dedos */
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .option-btn:active {
            transform: scale(0.96);
        }

        /* Estados de respuesta */
        .option-btn.correct {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.4);
        }

        .option-btn.incorrect {
            background-color: var(--danger-light);
            border-color: var(--danger-light);
            color: var(--danger);
            text-decoration: line-through;
            pointer-events: none; /* Evita múltiples clics en el mismo error */
            opacity: 0.8;
        }

        .option-btn.blink-correct {
            animation: blinker 1.2s linear infinite;
            background-color: var(--success);
            border-color: var(--success);
            color: white;
            pointer-events: none;
        }

        @keyframes blinker {
            50% { opacity: 0.6; transform: scale(1.05); box-shadow: 0 0 20px var(--success); }
        }

        /* Panel de Retroalimentación */
        .feedback-panel {
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .feedback-msg {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            min-height: 28px;
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            display: none; /* Oculto por defecto */
            transition: background-color 0.2s;
            box-shadow: 0 6px 15px rgba(67, 97, 238, 0.3);
        }

        .action-btn:hover {
            background-color: var(--primary-hover);
        }

        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1 class="title">Estadística Play</h1>
            <div class="lives" id="lives-display">❤️❤️❤️</div>
        </div>

        <div class="question-box">
            <div class="question-text">Encuentra la siguiente medida:</div>
            <div class="question-target" id="question-type">MEDIA</div>
            <div class="data-set" id="data-set">[ 0, 0, 0, 0, 0 ]</div>
        </div>

        <div class="options-grid" id="options-grid">
            </div>

        <div class="feedback-panel">
            <div class="feedback-msg" id="feedback-msg"></div>
            <button class="action-btn" id="action-btn" onclick="handleActionBtn()"></button>
        </div>
    </div>

    <script>
        // Variables de estado del juego
        let lives = 3;
        let correctAnswer = 0;
        let isLevelActive = true;
        let isGameOver = false;

        // Elementos del DOM
        const elLives = document.getElementById('lives-display');
        const elQuestionType = document.getElementById('question-type');
        const elDataSet = document.getElementById('data-set');
        const elOptionsGrid = document.getElementById('options-grid');
        const elFeedbackMsg = document.getElementById('feedback-msg');
        const elActionBtn = document.getElementById('action-btn');

        // Inicializar el primer nivel
        initGame();

        function initGame() {
            lives = 3;
            isGameOver = false;
            updateLivesUI();
            startNewLevel();
        }

        function startNewLevel() {
            isLevelActive = true;
            elActionBtn.style.display = 'none';
            elFeedbackMsg.textContent = '';
            
            generateMathProblem();
        }

        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateMathProblem() {
            const types = ['Media', 'Mediana', 'Moda'];
            const selectedType = types[Math.floor(Math.random() * types.length)];
            let dataArray = [];
            let answer = 0;

            if (selectedType === 'Moda') {
                // Generar Moda clara: Un número se repite 3 veces de 5
                const modeVal = randInt(2, 15);
                let distractor1 = randInt(1, 20);
                while(distractor1 === modeVal) distractor1 = randInt(1, 20);
                let distractor2 = randInt(1, 20);
                while(distractor2 === modeVal || distractor2 === distractor1) distractor2 = randInt(1, 20);
                
                dataArray = [modeVal, modeVal, modeVal, distractor1, distractor2];
                answer = modeVal;

            } else if (selectedType === 'Mediana') {
                // Generar Mediana: 5 números aleatorios
                dataArray = [randInt(1,20), randInt(1,20), randInt(1,20), randInt(1,20), randInt(1,20)];
                let sorted = [...dataArray].sort((a, b) => a - b);
                answer = sorted[2]; // El del medio en un array de 5

            } else {
                // Generar Media: Truco matemático para que la suma sea múltiplo de 5 y la media sea un entero
                let tempArray = [randInt(1,12), randInt(1,12), randInt(1,12), randInt(1,12)];
                let sum = tempArray.reduce((acc, curr) => acc + curr, 0);
                let remainder = sum % 5;
                let neededToMultiple = (remainder === 0) ? 0 : 5 - remainder;
                
                // Agregar un 5to número que complete el múltiplo de 5
                let lastNumber = neededToMultiple + (5 * randInt(0, 2)); 
                if (lastNumber === 0) lastNumber = 5;
                
                tempArray.push(lastNumber);
                dataArray = tempArray;
                answer = dataArray.reduce((acc, curr) => acc + curr, 0) / 5;
            }

            // Desordenar el array para que no sea obvio (especialmente para mediana y moda)
            dataArray.sort(() => Math.random() - 0.5);

            // Actualizar la UI de la pregunta
            correctAnswer = answer;
            elQuestionType.textContent = selectedType;
            elDataSet.textContent = `[ ${dataArray.join(", ")} ]`;

            generateOptions(answer);
        }

        function generateOptions(correct) {
            let optionsSet = new Set();
            optionsSet.add(correct);

            // Generar 3 distractores creíbles
            while(optionsSet.size < 4) {
                let offset = randInt(-4, 4);
                if (offset === 0) offset = 5; // Evitar duplicar la correcta
                let fakeOption = correct + offset;
                if (fakeOption >= 0) { // Mantener opciones positivas por simplicidad educativa
                    optionsSet.add(fakeOption);
                }
            }

            let optionsArray = Array.from(optionsSet).sort(() => Math.random() - 0.5);

            // Limpiar grid y renderizar botones
            elOptionsGrid.innerHTML = '';
            optionsArray.forEach(val => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = val;
                
                // Evento compatible con clics y toques móviles
                btn.addEventListener('click', () => checkAnswer(btn, val));
                elOptionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(btnElement, selectedValue) {
            // Si el nivel terminó o ya hizo clic en una opción incorrecta, no hacer nada
            if (!isLevelActive || btnElement.classList.contains('incorrect')) return;

            if (selectedValue === correctAnswer) {
                // ACIERTO
                isLevelActive = false;
                btnElement.classList.add('correct');
                lockAllOptions();
                
                elFeedbackMsg.textContent = "¡Excelente! Respuesta correcta ✨";
                elFeedbackMsg.style.color = "var(--success)";
                
                showActionBtn("Siguiente Nivel");

            } else {
                // FALLO
                btnElement.classList.add('incorrect');
                btnElement.textContent = "✘ " + selectedValue;
                lives--;
                updateLivesUI();

                if (lives > 0) {
                    elFeedbackMsg.textContent = "Casi... ¡Inténtalo de nuevo!";
                    elFeedbackMsg.style.color = "var(--danger)";
                } else {
                    // GAME OVER
                    isLevelActive = false;
                    isGameOver = true;
                    elFeedbackMsg.textContent = "¡Sin vidas! La respuesta era " + correctAnswer;
                    elFeedbackMsg.style.color = "var(--danger)";
                    
                    lockAllOptions();
                    highlightCorrectAnswer();
                    showActionBtn("Reintentar Juego");
                }
            }
        }

        function lockAllOptions() {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.style.pointerEvents = 'none');
        }

        function highlightCorrectAnswer() {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (parseInt(btn.textContent.replace('✘ ', '')) === correctAnswer) {
                    btn.classList.add('blink-correct');
                }
            });
        }

        function updateLivesUI() {
            let hearts = "";
            for(let i=0; i<3; i++) {
                hearts += (i < lives) ? "❤️" : "🖤";
            }
            elLives.textContent = hearts;
        }

        function showActionBtn(text) {
            elActionBtn.textContent = text;
            elActionBtn.style.display = 'inline-block';
        }

        function handleActionBtn() {
            if (isGameOver) {
                initGame();
            } else {
                startNewLevel();
            }
        }
    </script>
</body>
</html>
