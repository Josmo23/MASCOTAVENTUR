<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia de Tendencia Central</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --danger-light: #fadbd8;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --accent: #ffb703;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden; /* Previene scroll horizontal accidental */
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
            padding: 30px 20px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .screen { display: none; flex-direction: column; width: 100%; }
        .screen.active { display: flex; }

        h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* Ingreso Seguro */
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            box-sizing: border-box;
            outline: none;
